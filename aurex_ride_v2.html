<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurex Ride</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --black:#0a0a0a;--dark:#141414;--card:#1c1c1c;--border:#2a2a2a;
    --text:#e8e8e8;--sub:#888;--gold:#c9a84c;--green:#3dca7a;
    --red:#e05252;--blue:#4a9eff;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--black);color:var(--text);min-height:100vh;font-size:14px;}

  /* AUTH */
  #auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .auth-card{background:var(--dark);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:400px;}
  .auth-logo{text-align:center;margin-bottom:36px;}
  .auth-logo .wordmark{font-size:22px;font-weight:700;letter-spacing:0.12em;color:var(--gold);}
  .auth-logo .tagline{font-size:11px;color:var(--sub);letter-spacing:0.08em;margin-top:4px;}
  .auth-tabs{display:flex;gap:8px;margin-bottom:28px;background:var(--card);border-radius:8px;padding:4px;}
  .auth-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--sub);border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all 0.2s;}
  .auth-tab.active{background:var(--gold);color:var(--black);font-weight:600;}

  /* FORMS */
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px;letter-spacing:0.04em;}
  .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
  .form-group textarea{resize:vertical;min-height:80px;}
  select option{background:var(--dark);}

  /* BUTTONS */
  .btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;}
  .btn-gold{background:var(--gold);color:var(--black);}
  .btn-gold:hover{background:#d4b05a;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-outline:hover{border-color:var(--gold);color:var(--gold);}
  .btn-sm{width:auto;padding:7px 14px;font-size:12px;}
  .btn-danger{background:var(--red);color:white;}
  .btn-blue{background:var(--blue);color:white;}

  /* LAYOUT */
  #app{display:none;min-height:100vh;}
  .topbar{background:var(--dark);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
  .topbar-logo{font-size:16px;font-weight:700;letter-spacing:0.1em;color:var(--gold);}
  .topbar-right{display:flex;align-items:center;gap:16px;}
  .topbar-user{font-size:12px;color:var(--sub);}
  .logout-btn{background:none;border:1px solid var(--border);color:var(--sub);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;}
  .logout-btn:hover{border-color:var(--red);color:var(--red);}
  .nav{background:var(--dark);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto;}
  .nav-btn{padding:12px 16px;border:none;background:none;color:var(--sub);font-size:13px;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;}
  .nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
  .main{padding:24px;max-width:960px;margin:0 auto;}

  /* CARDS */
  .card{background:var(--dark);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .card-title{font-size:12px;font-weight:600;letter-spacing:0.08em;color:var(--sub);margin-bottom:16px;text-transform:uppercase;}

  /* STATS */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
  .stat-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;}
  .stat-label{font-size:11px;color:var(--sub);letter-spacing:0.06em;margin-bottom:6px;}
  .stat-value{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
  .stat-sub{font-size:11px;color:var(--sub);margin-top:4px;}
  .gold{color:var(--gold);}.green{color:var(--green);}.red{color:var(--red);}.blue{color:var(--blue);}

  /* PROGRESS */
  .progress-wrap{background:var(--card);border-radius:4px;height:8px;overflow:hidden;margin:8px 0;}
  .progress-bar{height:100%;border-radius:4px;transition:width 0.4s ease;}

  /* TABLE */
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:10px 12px;font-size:11px;color:var(--sub);letter-spacing:0.06em;border-bottom:1px solid var(--border);font-weight:500;}
  td{padding:12px;border-bottom:1px solid var(--border);color:var(--text);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}

  /* BADGE */
  .badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;}
  .badge-ot{background:rgba(224,82,82,0.15);color:var(--red);}
  .badge-normal{background:rgba(61,202,122,0.15);color:var(--green);}
  .badge-pending{background:rgba(201,168,76,0.15);color:var(--gold);}
  .badge-confirmed{background:rgba(74,158,255,0.15);color:var(--blue);}
  .badge-done{background:rgba(61,202,122,0.15);color:var(--green);}
  .badge-cancelled{background:rgba(136,136,136,0.15);color:var(--sub);}

  /* GRID */
  .trip-input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  @media(max-width:600px){
    .trip-input-row,.grid-3{grid-template-columns:1fr;}
    .main{padding:16px;}
  }

  /* NOTIFY */
  .notif{position:fixed;top:70px;right:20px;background:var(--card);border:1px solid var(--gold);border-radius:8px;padding:12px 18px;font-size:13px;z-index:999;animation:slideIn 0.3s ease;max-width:320px;}
  @keyframes slideIn{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

  /* MISC */
  .section-title{font-size:18px;font-weight:600;margin-bottom:20px;color:var(--text);}
  .empty-state{text-align:center;padding:40px 20px;color:var(--sub);font-size:13px;}
  .inline-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
  .mono{font-family:'DM Mono',monospace;}

  /* CLIENT SELECTOR */
  .client-pill{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;transition:all 0.2s;}
  .client-pill.active{border-color:var(--gold);color:var(--gold);}
  .client-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--green);}

  /* MAP */
  #map-container{width:100%;height:220px;border-radius:8px;overflow:hidden;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:13px;margin-top:12px;}
  .route-info{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:12px;font-size:13px;}
  .route-info .ri-row{display:flex;justify-content:space-between;margin-bottom:6px;}
  .route-info .ri-row:last-child{margin-bottom:0;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:var(--dark);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:20px;}

  /* EMAIL LOG */
  .email-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;font-size:12px;}
  .email-item .ei-header{display:flex;justify-content:space-between;margin-bottom:4px;}
  .email-item .ei-to{color:var(--gold);}
  .email-item .ei-time{color:var(--sub);}
  .email-item .ei-subject{color:var(--text);font-weight:500;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="wordmark">AUREX RIDE</div>
      <div class="tagline">EXECUTIVE CHAUFFEUR SERVICES</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('client')">Client Login</button>
      <button class="auth-tab" onclick="switchAuthTab('driver')">Driver / Admin</button>
    </div>
    <div id="client-login">
      <div class="form-group"><label>EMAIL</label><input type="email" id="client-email" placeholder="your@email.com"/></div>
      <div class="form-group"><label>PASSWORD</label><input type="password" id="client-pass" placeholder="••••••••"/></div>
      <button class="btn btn-gold" onclick="loginClient()">Sign In</button>
      <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--sub)">Demo: lemon@aurex.com / 1234</p>
    </div>

      <div class="form-group"><label>用户名</label><input type="text" id="driver-user" placeholder="admin"/></div>

      <button class="btn btn-gold" onclick="loginDriver()">登录系统</button>
      <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--sub)">Demo: admin / 1234</p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">AUREX RIDE</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>
  <div id="client-nav" class="nav" style="display:none">
    <button class="nav-btn active" onclick="showPage('c-dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="showPage('c-trips')">Book a Trip</button>
    <button class="nav-btn" onclick="showPage('c-history')">My Trips</button>
    <button class="nav-btn" onclick="showPage('c-billing')">Billing</button>

  <div id="driver-nav" class="nav" style="display:none">
    <button class="nav-btn active" onclick="showPage('d-dashboard')">总览</button>
    <button class="nav-btn" onclick="showPage('d-clients')">客户管理</button>
    <button class="nav-btn" onclick="showPage('d-checkin')">打卡</button>
    <button class="nav-btn" onclick="showPage('d-trips')">行程管理</button>
    <button class="nav-btn" onclick="showPage('d-billing')">账单结算</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── STORAGE ──
const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem('aurex2_'+k)||'null'); } catch(e){return null;} },
  set: (k,v) => { try { localStorage.setItem('aurex2_'+k, JSON.stringify(v)); } catch(e){} }
};

// ── GOOGLE MAPS API KEY (user sets this) ──
let MAPS_KEY = DB.get('maps_key') || '';

// ── DEMO DATA ──
function initDemo() {
  if (!DB.get('init')) {
    DB.set('clients', [
      { id:'c1', name:'Lemon', email:'lemon@aurex.com', pass:'1234', phone:'+60123456789',
        package:{ monthly_hours:200, rate:60, ot_multi:2, daily_std:10, night_cutoff:22, monthly_fee:12000 },
        month: getCurrentMonth() },
      { id:'c2', name:'David Tan', email:'david@aurex.com', pass:'1234', phone:'+60198765432',
        package:{ monthly_hours:160, rate:60, ot_multi:2, daily_std:10, night_cutoff:22, monthly_fee:9600 },
        month: getCurrentMonth() }
    ]);
    DB.set('sessions', {});   // { clientId: [...sessions] }
    DB.set('trips', []);
    DB.set('emails', []);
    DB.set('init', true);
  }
}

function getCurrentMonth() {
  const d = new Date(); return `${d.getFullYear()}-${d.getMonth()+1}`;
}

let currentRole = null;
let currentClientId = null; // which client driver is viewing
let activePage = null;

// ── AUTH ──
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('client-login').style.display = tab==='client'?'block':'none';
  document.getElementById('driver-login').style.display = tab==='driver'?'block':'none';
}

function loginClient() {
  const email = document.getElementById('client-email').value.trim().toLowerCase();
  const pass = document.getElementById('client-pass').value;
  const clients = DB.get('clients')||[];
  const c = clients.find(x=>x.email.toLowerCase()===email && x.pass===pass);
  if (c) { currentRole='client'; currentClientId=c.id; startApp(c.name); }
  else notify('Invalid email or password','red');
}

function loginDriver() {
  const user = document.getElementById('driver-user').value.trim().toLowerCase();
  const pass = document.getElementById('driver-pass').value;
  if ((user==='admin'||user==='becool') && pass==='1234') {
    currentRole='driver';
    const clients = DB.get('clients')||[];
    currentClientId = clients[0]?.id || null;
    startApp('Becool');
  } else notify('用户名或密码错误','red');
}

function startApp(name) {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('topbar-user').textContent=name;
  document.getElementById('client-nav').style.display=currentRole==='client'?'flex':'none';
  document.getElementById('driver-nav').style.display=currentRole==='driver'?'flex':'none';
  showPage(currentRole==='client'?'c-dashboard':'d-dashboard');
}

function logout() {
  currentRole=null; currentClientId=null;
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

// ── NAV ──
function showPage(id) {
  activePage=id;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btn=[...document.querySelectorAll('.nav-btn')].find(b=>b.getAttribute('onclick')?.includes(id));
  if(btn) btn.classList.add('active');
  const pages={
    'c-dashboard':clientDashboard,'c-trips':clientTrips,'c-history':clientHistory,'c-billing':clientBilling,
    'd-dashboard':driverDashboard,'d-clients':driverClients,'d-checkin':driverCheckin,
    'd-trips':driverTrips,'d-billing':driverBilling,'d-emails':driverEmails
  };
  document.getElementById('page-content').innerHTML = pages[id]?pages[id]():'';
}

// ── HELPERS ──
function getClient(id) {
  return (DB.get('clients')||[]).find(c=>c.id===(id||currentClientId));
}

function getHoursData(clientId) {
  const c = getClient(clientId);
  if (!c) return {};
  const pkg = c.package;
  const sessions = (DB.get('sessions')||{})[c.id] || [];
  let stdH=0, otH=0;
  sessions.forEach(s=>{ stdH+=s.standard||0; otH+=s.ot||0; });
  const totalDed = stdH + (otH * pkg.ot_multi);
  const remaining = Math.max(0, pkg.monthly_hours - totalDed);
  const pct = Math.min(100,(totalDed/pkg.monthly_hours)*100);
  return { stdH, otH, totalDed, remaining, pct, pkg };
}

function fmtHours(h) {
  if (!h||h===0) return '0h';
  const hrs=Math.floor(h), mins=Math.round((h-hrs)*60);
  return mins>0?`${hrs}h ${mins}m`:`${hrs}h`;
}
function fmtMoney(n) { return 'RM '+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'}); }
function fmtTime(iso) { return new Date(iso).toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'}); }
function statusLabel(s) { return {pending:'待确认',confirmed:'已确认',done:'已完成',cancelled:'已取消'}[s]||s; }
function statusLabelEn(s) { return {pending:'Pending',confirmed:'Confirmed',done:'Completed',cancelled:'Cancelled'}[s]||s; }

// ── EMAILJS CONFIG ──
const EJS = {
  service: 'service_r1cswsw',
  template: 'template_p2nunj8',
  pubkey: 'yXDAyhsLpY7IPW_H'
};
emailjs.init({ publicKey: EJS.pubkey });

// ── EMAIL (REAL) ──
async function sendEmail(to, toName, subject, body, type='trip') {
  // Log locally
  const emails = DB.get('emails')||[];
  const entry = { id:'E'+Date.now(), to, toName, subject, body, type, time: new Date().toISOString(), sent:false };
  emails.unshift(entry);
  DB.set('emails', emails);

  // Always send to driver (Becoolyong147@gmail.com)
  const driverEmail = 'Becoolyong147@gmail.com';

  try {
    // Send to recipient
    await emailjs.send(EJS.service, EJS.template, {
      to_name: toName,
      to_email: to,
      subject: subject,
      message: body
    });
    // If recipient is not driver, also send copy to driver
    if (to.toLowerCase() !== driverEmail.toLowerCase()) {
      await emailjs.send(EJS.service, EJS.template, {
        to_name: 'Becool',
        to_email: driverEmail,
        subject: '[COPY] ' + subject,
        message: body
      });
    }
    // Mark sent
    const updated = DB.get('emails')||[];
    const idx = updated.findIndex(e=>e.id===entry.id);
    if (idx>=0) { updated[idx].sent=true; DB.set('emails',updated); }
  } catch(err) {
    console.error('EmailJS error:', err); notify('Email error: '+(err.text||JSON.stringify(err)), 'red');
  }
}

function notifyTripBooked(trip, client) {
  // To driver
  sendEmail('Becoolyong147@gmail.com','Becool',
    `New Trip Request — ${client.name}`,
    `Client: ${client.name}\nPickup: ${fmtDate(trip.pickup_time)} at ${fmtTime(trip.pickup_time)}\nFrom: ${trip.from}\nTo: ${trip.to}\nEst. Travel: ${trip.est_duration||'~45 min'}\nDistance: ${trip.est_distance||'—'}\nNotes: ${trip.notes||'None'}\n\nPlease confirm in the system.`,'trip');
  // To client
  sendEmail(client.email, client.name,
    `Your trip has been received`,
    `Hi ${client.name},\n\nYour trip request has been received.\n\nDetails:\nDate: ${fmtDate(trip.pickup_time)}\nPickup: ${fmtTime(trip.pickup_time)}\nFrom: ${trip.from}\nTo: ${trip.to}\nEst. Travel: ${trip.est_duration||'~45 min'}\n\nYour driver will confirm shortly.\n\nAurex Ride`,'trip');
}

function notifyTripConfirmed(trip, client) {
  sendEmail(client.email, client.name,
    `Trip Confirmed ✓`,
    `Hi ${client.name},\n\nYour trip has been confirmed.\n\nPickup: ${fmtTime(trip.pickup_time)}\nFrom: ${trip.from} → ${trip.to}\nDriver departs at: ${trip.suggested_depart ? fmtTime(trip.suggested_depart) : '—'}\n\nSee you soon!\nAurex Ride`,'confirm');
}

function notifyHoursLow(client, remaining) {
  sendEmail(client.email, client.name,
    `⚠ Hours Running Low — ${fmtHours(remaining)} Remaining`,
    `Hi ${client.name},\n\nYour monthly package is running low.\n\nRemaining: ${fmtHours(remaining)}\nPackage: ${client.package.monthly_hours}h\n\nPlease contact your driver to discuss renewal or top-up.\n\nAurex Ride`,'alert');
}

function notifyMonthlyStatement(client) {
  const {stdH,otH,totalDed,remaining,pkg} = getHoursData(client.id);
  const extraH = Math.max(0, totalDed-pkg.monthly_hours);
  const extraCost = extraH*pkg.rate;
  const total = pkg.monthly_fee + extraCost;
  sendEmail(client.email, client.name,
    `Monthly Statement — ${new Date().toLocaleString('en-MY',{month:'long',year:'numeric'})}`,
    `Hi ${client.name},\n\nPlease find your monthly statement below.\n\nPackage: ${pkg.monthly_hours}h @ RM${pkg.monthly_fee.toFixed(0)}/month\nStandard Hours Used: ${fmtHours(stdH)}\nOT Hours: ${fmtHours(otH)} (×2 = ${fmtHours(otH*2)})\nTotal Deducted: ${fmtHours(totalDed)}\nExcess Hours: ${fmtHours(extraH)}\n\nPackage Fee: RM${pkg.monthly_fee.toFixed(2)}\nExcess Fee: ${extraCost>0?fmtMoney(extraCost):'RM 0.00'}\nTOTAL DUE: ${fmtMoney(total)}\n\nThank you for choosing Aurex Ride.\nBecool`,'billing');
}

// ── GOOGLE MAPS ROUTE ──
async function getRoute(from, to) {
  if (!MAPS_KEY) return null;
  try {
    const url = `https://maps.googleapis.com/maps/api/directions/json?origin=${encodeURIComponent(from)}&destination=${encodeURIComponent(to)}&region=my&key=${MAPS_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.status==='OK' && d.routes[0]) {
      const leg = d.routes[0].legs[0];
      return { duration: leg.duration.text, duration_sec: leg.duration.value, distance: leg.distance.text };
    }
  } catch(e) {}
  return null;
}

// Estimate departure based on travel time
function calcDeparture(pickupISO, travelSec) {
  const pickup = new Date(pickupISO);
  pickup.setSeconds(pickup.getSeconds() - (travelSec||2700) - 600); // travel + 10min buffer
  return pickup.toISOString();
}

// ── CLIENT PAGES ──
function clientDashboard() {

    </div>

    </div>
    <div class="form-group"><label>NOTES (optional)</label><textarea id="trip-notes" placeholder="Any special instructions..."></textarea></div>

  </div>

async function submitTrip() {
  const date=document.getElementById('trip-date').value;
  const time=document.getElementById('trip-time').value;
  const from=document.getElementById('trip-from').value.trim();
  const to=document.getElementById('trip-to').value.trim();
  const notes=document.getElementById('trip-notes').value.trim();
  if (!date||!time||!from||!to) { notify('Please fill in all required fields','red'); return; }

  const btn=document.getElementById('submit-trip-btn');
  btn.textContent='Calculating route...'; btn.disabled=true;

  const pickupISO=new Date(`${date}T${time}`).toISOString();
  let est=null, travelSec=2700;

  // Try Google Maps
  if (MAPS_KEY) {
    est = await getRoute(from+', Malaysia', to+', Malaysia');
    if (est) travelSec = est.duration_sec;
  }

  const departISO = calcDeparture(pickupISO, travelSec);
  const tripId='T'+Date.now();

  const trip={
    id:tripId, client_id:currentClientId, from, to, notes,
    pickup_time:pickupISO, suggested_depart:departISO,
    est_duration: est?est.duration:'~45 min',
    est_distance: est?est.distance:'—',
    status:'pending', created:new Date().toISOString()
  };

  const trips=DB.get('trips')||[];
  trips.push(trip); DB.set('trips',trips);

  // Send emails
  const c=getClient();
  notifyTripBooked(trip, c);

  btn.textContent='Check Route & Request Trip'; btn.disabled=false;

  document.getElementById('trip-estimate').style.display='block';
  document.getElementById('estimate-content').innerHTML=`
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-label">PICKUP TIME</div><div class="stat-value mono" style="font-size:20px">${time}</div><div class="stat-sub">${from}</div></div>
    <div class="stat-box"><div class="stat-label">DRIVER DEPARTS</div><div class="stat-value mono gold" style="font-size:20px">${fmtTime(departISO)}</div><div class="stat-sub">incl. 10 min buffer</div></div>
    ${est?`<div class="stat-box"><div class="stat-label">DISTANCE</div><div class="stat-value" style="font-size:18px">${est.distance}</div></div>
    <div class="stat-box"><div class="stat-label">TRAVEL TIME</div><div class="stat-value" style="font-size:18px">${est.duration}</div></div>`:''}
  </div>
  <p style="font-size:12px;color:var(--gold);margin-top:12px">✓ Trip requested. Driver will confirm shortly. Notification sent to your email.</p>`;

  notify('Trip requested! Driver notified.','gold');
}

  const phone=document.getElementById('nc-phone').value.trim();

}

function saveEditClient(clientId) {
  const clients=DB.get('clients')||[];
  const idx=clients.findIndex(c=>c.id===clientId);
  if (idx<0) return;
  clients[idx].name=document.getElementById('ec-name').value.trim();
  clients[idx].email=document.getElementById('ec-email').value.trim();
  clients[idx].phone=document.getElementById('ec-phone').value.trim();
  clients[idx].package.monthly_hours=parseFloat(document.getElementById('ec-hours').value)||200;
  clients[idx].package.monthly_fee=parseFloat(document.getElementById('ec-fee').value)||12000;
  clients[idx].package.rate=parseFloat(document.getElementById('ec-rate').value)||60;
  clients[idx].package.daily_std=parseFloat(document.getElementById('ec-std').value)||10;
  DB.set('clients',clients);

      <tr>
        <td class="mono">${fmtTime(s.start)}</td>
        <td class="mono">${s.end?fmtTime(s.end):'<span style="color:var(--gold)">进行中</span>'}</td>
        <td class="mono">${s.standard?fmtHours(s.standard):'—'}</td>
        <td class="mono red">${s.ot?fmtHours(s.ot):'—'}</td>
        <td class="mono gold">${s.deducted?fmtHours(s.deducted):'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`}
  </div>
  <div class="card">
    <div class="card-title">手动添加记录</div>
    <div class="trip-input-row">
      <div class="form-group"><label>上班时间</label><input type="datetime-local" id="manual-start"/></div>
      <div class="form-group"><label>下班时间</label><input type="datetime-local" id="manual-end"/></div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="addManualSession()">添加记录</button>
  </div>`;
}

function clockIn() {
  const all=DB.get('sessions')||{};
  const sessions=all[currentClientId]||[];
  if (sessions.find(s=>!s.end)) { notify('已经在上班中','red'); return; }
  sessions.push({start:new Date().toISOString(),end:null,standard:0,ot:0,deducted:0});
  all[currentClientId]=sessions; DB.set('sessions',all);
  notify('上班打卡成功 ✓','gold'); showPage('d-checkin');
}

function clockOut() {
  const all=DB.get('sessions')||{};
  const sessions=all[currentClientId]||[];
  const idx=sessions.findIndex(s=>!s.end);
  if (idx<0) { notify('没有找到打卡记录','red'); return; }
  sessions[idx].end=new Date().toISOString();
  calcSession(sessions[idx],currentClientId);
  all[currentClientId]=sessions; DB.set('sessions',all);
  notify(`下班打卡成功 · 扣除 ${fmtHours(sessions[idx].deducted)}`,'green');
  showPage('d-checkin');
}

function addManualSession() {
  const start=document.getElementById('manual-start').value;
  const end=document.getElementById('manual-end').value;
  if (!start||!end) { notify('请填写完整时间','red'); return; }
  const s={start:new Date(start).toISOString(),end:new Date(end).toISOString()};
  calcSession(s,currentClientId);
  const all=DB.get('sessions')||{};
  const sessions=all[currentClientId]||[];
  sessions.push(s); all[currentClientId]=sessions; DB.set('sessions',all);
  notify(`已添加 · 扣除 ${fmtHours(s.deducted)}`,'gold'); showPage('d-checkin');
}

function calcSession(s,clientId) {
  const c=getClient(clientId);
  const pkg=c.package;
  const start=new Date(s.start), end=new Date(s.end);
  const totalH=(end-start)/3600000;
  const cutoff=new Date(start); cutoff.setHours(pkg.night_cutoff||22,0,0,0);
  let stdH=0,otH=0;
  if (end>cutoff) {
    if (start>=cutoff) { otH=totalH; }
    else {
      const before=(cutoff-start)/3600000, after=(end-cutoff)/3600000;
      stdH=Math.min(before,pkg.daily_std||10);
      otH=before>pkg.daily_std?(before-pkg.daily_std)+after:after;
    }
  } else {
    stdH=Math.min(totalH,pkg.daily_std||10);
    otH=totalH>pkg.daily_std?totalH-pkg.daily_std:0;
  }
  s.standard=parseFloat(stdH.toFixed(2));
  s.ot=parseFloat(otH.toFixed(2));
  s.deducted=parseFloat((s.standard+s.ot*(pkg.ot_multi||2)).toFixed(2));
}

function confirmTrip(tripId) {
  const trips=DB.get('trips')||[];
  const idx=trips.findIndex(t=>t.id===tripId);
  if (idx<0) return;
  trips[idx].status='confirmed';
  DB.set('trips',trips);
  const c=getClient(trips[idx].client_id);
  notifyTripConfirmed(trips[idx],c);
  notify(`行程已确认，已通知 ${c.name}`,'gold');
  showPage(activePage);
}

function updateTripStatus(id,status) {
  const trips=DB.get('trips')||[];
  const idx=trips.findIndex(t=>t.id===id);
  if (idx>=0) { trips[idx].status=status; DB.set('trips',trips); notify(status==='done'?'行程已完成 ✓':'已更新','gold'); showPage(activePage); }
}

function driverTrips() {
  const allTrips=DB.get('trips')||[];
  const trips=[...allTrips].reverse();
  return `
  <div class="section-title">行程管理</div>
  ${clientSelectorHtml('d-trips')}
  <div class="card">
    ${trips.length===0?'<div class="empty-state">暂无行程记录</div>':`
    <div class="table-wrap"><table>
      <thead><tr><th>客户</th><th>日期</th><th>时间</th><th>路线</th><th>距离</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>${trips.map(t=>{
        const c=getClient(t.client_id);
        return `<tr>
          <td style="font-size:12px;color:var(--gold)">${c?.name||'—'}</td>
          <td style="font-size:12px">${fmtDate(t.pickup_time)}</td>
          <td class="mono">${fmtTime(t.pickup_time)}</td>
          <td style="font-size:12px">${t.from} → ${t.to}</td>
          <td style="font-size:12px;color:var(--sub)">${t.est_distance||'—'}</td>
          <td><span class="badge badge-${t.status}">${statusLabel(t.status)}</span></td>
          <td><div style="display:flex;gap:6px;flex-wrap:wrap">
            ${t.status==='pending'?`<button class="btn btn-gold btn-sm" onclick="confirmTrip('${t.id}')">确认</button>`:''}
            ${t.status==='confirmed'?`<button class="btn btn-outline btn-sm" onclick="updateTripStatus('${t.id}','done')">完成</button>`:''}
            ${t.status!=='cancelled'&&t.status!=='done'?`<button class="btn btn-outline btn-sm" onclick="updateTripStatus('${t.id}','cancelled')">取消</button>`:''}
          </div></td>
        </tr>`;}).join('')}</tbody>
    </table></div>`}
  </div>`;
}

function driverBilling() {
  const c=getClient();
  const {stdH,otH,totalDed,remaining,pkg}=getHoursData();
  const extraH=Math.max(0,totalDed-pkg.monthly_hours);
  const extraCost=extraH*pkg.rate;
  const totalDue=pkg.monthly_fee+extraCost;
  return `
  <div class="section-title">账单结算</div>
  ${clientSelectorHtml('d-billing')}
  <div class="card">
    <div class="card-title">当前客户：${c?.name} · ${new Date().toLocaleString('zh-MY',{month:'long',year:'numeric'})}</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-label">包月费</div><div class="stat-value gold" style="font-size:18px">${fmtMoney(pkg.monthly_fee)}</div><div class="stat-sub">${pkg.monthly_hours}h 标准时数</div></div>
      <div class="stat-box"><div class="stat-label">标准时数</div><div class="stat-value">${fmtHours(stdH)}</div></div>
      <div class="stat-box"><div class="stat-label">OT时数</div><div class="stat-value red">${fmtHours(otH)}</div><div class="stat-sub">×2 = ${fmtHours(otH*2)}</div></div>
      <div class="stat-box"><div class="stat-label">超出时数</div><div class="stat-value ${extraH>0?'red':'green'}">${fmtHours(extraH)}</div><div class="stat-sub">${extraH>0?`+${fmtMoney(extraCost)}`:'未超出'}</div></div>
    </div>
    <hr class="divider">
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--sub)">包月费</span><span class="mono">${fmtMoney(pkg.monthly_fee)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--sub)">超时费 (${fmtHours(extraH)} × RM${pkg.rate})</span><span class="mono ${extraCost>0?'red':''}">${extraCost>0?fmtMoney(extraCost):'—'}</span></div>
      <hr class="divider">
      <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700"><span>本月应收</span><span class="mono gold">${fmtMoney(totalDue)}</span></div>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" onclick="generateReport()">📋 生成报告</button>
      <button class="btn btn-gold btn-sm" onclick="sendStatement(currentClientId);notify('月结已发送','gold')">📧 发送月结给客户</button>
    </div>
  </div>
  <div class="card" id="report-card" style="display:none">
    <div class="card-title">月结报告</div>
    <pre id="report-text" style="font-size:12px;font-family:'DM Mono',monospace;color:var(--sub);line-height:1.8;white-space:pre-wrap"></pre>
    <div style="margin-top:12px"><button class="btn btn-gold btn-sm" onclick="copyReport()">复制报告</button></div>
  </div>

  <div class="card">
    <div class="card-title">Google Maps 设置</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:12px">输入 API Key 后，行程预订时会自动计算真实路程和时间。</div>
    <div class="form-group"><label>GOOGLE MAPS API KEY</label><input type="text" id="maps-key-input" value="${MAPS_KEY}" placeholder="AIza..."/></div>
    <button class="btn btn-outline btn-sm" onclick="saveMapsKey()">保存 API Key</button>
  </div>`;
}

function saveMapsKey() {
  MAPS_KEY=document.getElementById('maps-key-input').value.trim();
  DB.set('maps_key',MAPS_KEY);
  notify(MAPS_KEY?'Google Maps API Key 已保存 ✓':'API Key 已清除','gold');
}

function generateReport() {
  const c=getClient();
  const {stdH,otH,totalDed,remaining,pkg}=getHoursData();
  const extraH=Math.max(0,totalDed-pkg.monthly_hours);
  const extraCost=extraH*pkg.rate;
  const totalDue=pkg.monthly_fee+extraCost;
  const month=new Date().toLocaleString('en-MY',{month:'long',year:'numeric'});
  const report=`AUREX RIDE — Monthly Statement
================================
Client   : ${c.name}
Period   : ${month}
Generated: ${new Date().toLocaleString('en-MY')}

HOURS SUMMARY
--------------------------------
Package Hours    : ${pkg.monthly_hours}h
Standard Hours   : ${fmtHours(stdH)}
OT Hours         : ${fmtHours(otH)} (×2 = ${fmtHours(otH*2)})
Total Deducted   : ${fmtHours(totalDed)}
Remaining        : ${fmtHours(remaining)}
Excess Hours     : ${fmtHours(extraH)}

BILLING
--------------------------------
Monthly Package  : ${fmtMoney(pkg.monthly_fee)}
Excess (${fmtHours(extraH)} × RM${pkg.rate}) : ${extraCost>0?fmtMoney(extraCost):'RM 0.00'}
--------------------------------
TOTAL DUE        : ${fmtMoney(totalDue)}

OT Policy: >10h/day or after 10PM = ×2 deduction`.trim();
  document.getElementById('report-card').style.display='block';
  document.getElementById('report-text').textContent=report;
}

function copyReport() {
  navigator.clipboard.writeText(document.getElementById('report-text').textContent)
    .then(()=>notify('已复制到剪贴板 ✓','gold'));
}

function driverEmails() {
  const emails=DB.get('emails')||[];
  const typeColors={'trip':'var(--blue)','confirm':'var(--green)','alert':'var(--gold)','billing':'var(--sub)'};
  const typeLabel={'trip':'行程通知','confirm':'确认通知','alert':'提醒','billing':'账单'};
  return `
  <div class="section-title">通知记录</div>
  <div style="font-size:12px;color:var(--sub);margin-bottom:16px">以下是系统模拟发送的Email通知记录。接入真实Email服务后，这些通知会自动发出。</div>
  ${emails.length===0?'<div class="card"><div class="empty-state">暂无通知记录</div></div>':
  emails.map(e=>`
  <div class="email-item">
    <div class="ei-header">
      <span class="ei-to">To: ${e.toName} &lt;${e.to}&gt;</span>
      <span class="ei-time">${fmtDate(e.time)} ${fmtTime(e.time)}</span>
    </div>
    <div class="ei-subject">${e.subject}</div>
    <div style="margin-top:6px;color:var(--sub);font-size:11px;display:flex;align-items:center;gap:8px">
      <span style="color:${typeColors[e.type]||'var(--sub)'}">${typeLabel[e.type]||e.type}</span>
      <span>· ✓ 已发送（模拟）</span>
      <button class="btn btn-outline btn-sm" style="font-size:10px;padding:3px 8px" onclick="viewEmail('${e.id}')">查看内容</button>
    </div>

function viewEmail(id) {
  const e=(DB.get('emails')||[]).find(x=>x.id===id);
  if (!e) return;
  document.getElementById('modal-title').textContent=e.subject;
  document.getElementById('modal-body').innerHTML=`
  <div style="font-size:12px;color:var(--sub);margin-bottom:12px">To: ${e.toName} &lt;${e.to}&gt; · ${fmtDate(e.time)}</div>
  <pre style="font-size:13px;white-space:pre-wrap;line-height:1.8;color:var(--text)">${e.body}</pre>
  <div style="margin-top:16px"><button class="btn btn-outline" onclick="closeModal()">关闭</button></div>`;
  document.getElementById('modal').style.display='flex';
}

// ── MODAL ──
function closeModal() { document.getElementById('modal').style.display='none'; }

// ── NOTIFY ──
function notify(msg,type='gold') {
  const colors={gold:'var(--gold)',red:'var(--red)',green:'var(--green)'};
  const el=document.createElement('div');
  el.className='notif'; el.style.borderColor=colors[type]||colors.gold; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>el.remove(),3000);
}

initDemo();

setInterval(()=>{
  if (activePage==='d-checkin') {
    const el=document.getElementById('live-clock');
    if (el) el.textContent=new Date().toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
},1000);
